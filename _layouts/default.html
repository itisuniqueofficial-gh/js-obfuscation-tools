<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <meta name="robots" content="{{ page.robots | default: 'index,follow' }}">
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="manifest" href="{{ '/manifest.webmanifest' | relative_url }}">
  <meta name="theme-color" content="#111827">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
  <meta property="og:description" content="{{ page.description | default: site.description | escape }}">
  <meta property="og:url" content="{{ page.url | replace:'index.html','' | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title | escape }}">
  <meta property="og:image" content="{{ page.image | default: site.image | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title | escape }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | escape }}">
  <meta name="twitter:image" content="{{ page.image | default: site.image | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script defer src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": {{ site.title | jsonify }},
      "url": {{ site.url | append: site.baseurl | jsonify }},
      "description": {{ site.description | jsonify }},
      "inLanguage": {{ site.lang | jsonify }}
    }
  </script>
</head>
<body data-baseurl="{{ site.baseurl }}">
  <a class="skip-link" href="#main-content">Skip to content</a>
  {% include header.html %}
  <main id="main-content" class="site-main">
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
